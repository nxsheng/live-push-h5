<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H5 Live Push</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        #local_video { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #status-bar { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: rgba(0,0,0,0.7); padding: 12px; text-align: center;
            font-size: 14px; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="local_video"></div>
    <div id="status-bar">准备推流...</div>

    <script>
        var statusBar = document.getElementById('status-bar');
        var livePusher = null;
        var isPushing = false;
        var retryCount = 0;
        var maxRetries = 3;
        var connectingTimeout = null;

        function log(msg) {
            console.log('[H5] ' + msg);
        }

        function setStatus(msg) {
            statusBar.textContent = msg;
            log('Status: ' + msg);
        }

        function clearConnectingTimeout() {
            if (connectingTimeout) {
                clearTimeout(connectingTimeout);
                connectingTimeout = null;
            }
        }

        function doStartPush(pushUrl) {
            log('doStartPush called, retryCount: ' + retryCount);
            
            if (livePusher) {
                try {
                    livePusher.stopPush();
                } catch (e) {}
            }

            livePusher.setObserver({
                onPushStatusUpdate: function(status, message) {
                    log('Status: ' + status + ', ' + message);
                    
                    if (status === 1 || status === 'CONNECTING') {
                        setStatus('正在连接服务器...');
                        
                        clearConnectingTimeout();
                        connectingTimeout = setTimeout(function() {
                            if (!isPushing && retryCount < maxRetries) {
                                log('Connecting timeout, retrying...');
                                retryCount++;
                                setStatus('连接超时，重试第 ' + retryCount + ' 次...');
                                doStartPush(pushUrl);
                            }
                        }, 8000);
                    } else if (status === 3 || status === 'PUSHING') {
                        clearConnectingTimeout();
                        isPushing = true;
                        setStatus('推流中...');
                        if (window.flutter_inappwebview) {
                            window.flutter_inappwebview.callHandler('pushStarted');
                        }
                    } else if (status === -1 || status === 'ERROR') {
                        clearConnectingTimeout();
                        if (retryCount < maxRetries) {
                            log('Push error, retrying...');
                            retryCount++;
                            setStatus('推流错误，重试第 ' + retryCount + ' 次...');
                            setTimeout(function() {
                                doStartPush(pushUrl);
                            }, 2000);
                        } else {
                            setStatus('推流错误: ' + message);
                            if (window.flutter_inappwebview) {
                                window.flutter_inappwebview.callHandler('pushError', message);
                            }
                        }
                    } else {
                        clearConnectingTimeout();
                        setStatus('正在连接服务器...');
                    }
                },
                onError: function(error) {
                    clearConnectingTimeout();
                    log('Error: ' + JSON.stringify(error));
                    if (retryCount < maxRetries) {
                        log('Observer error, retrying...');
                        retryCount++;
                        setStatus('错误，重试第 ' + retryCount + ' 次...');
                        setTimeout(function() {
                            doStartPush(pushUrl);
                        }, 2000);
                    } else {
                        setStatus('错误: ' + error.message);
                        if (window.flutter_inappwebview) {
                            window.flutter_inappwebview.callHandler('pushError', error.message);
                        }
                    }
                }
            });

            livePusher.startPush(pushUrl).then(function() {
                log('startPush returned');
            }).catch(function(error) {
                clearConnectingTimeout();
                log('startPush catch error: ' + error.message);
                if (retryCount < maxRetries) {
                    retryCount++;
                    setStatus('推流失败，重试第 ' + retryCount + ' 次...');
                    setTimeout(function() {
                        doStartPush(pushUrl);
                    }, 2000);
                } else {
                    setStatus('推流失败: ' + error.message);
                    if (window.flutter_inappwebview) {
                        window.flutter_inappwebview.callHandler('pushError', error.message);
                    }
                }
            });
        }

        window.startPush = function() {
            log('startPush called');
            
            if (typeof TXLivePusher === 'undefined') {
                log('TXLivePusher SDK not loaded');
                setStatus('SDK加载失败');
                return;
            }
            
            if (!window.pushUrl) {
                log('Push URL is empty');
                setStatus('推流地址为空');
                return;
            }
            
            var pushUrl = window.pushUrl;
            log('Push URL: ' + pushUrl);

            retryCount = 0;
            isPushing = false;
            clearConnectingTimeout();

            TXLivePusher.checkSupport().then(function(data) {
                log('Support: ' + JSON.stringify(data));
                
                livePusher = new TXLivePusher();
                livePusher.setRenderView('local_video');
                
                if (livePusher.videoView) {
                    livePusher.videoView.muted = true;
                }
                
                livePusher.setVideoQuality('480p');
                livePusher.setAudioQuality('standard');

                return Promise.all([
                    livePusher.startCamera(),
                    livePusher.startMicrophone()
                ]);
            })
            .then(function() {
                log('Camera and microphone started');
                doStartPush(pushUrl);
            })
            .catch(function(error) {
                log('Error: ' + error.message);
                setStatus('推流失败: ' + error.message);
                if (window.flutter_inappwebview) {
                    window.flutter_inappwebview.callHandler('pushError', error.message);
                }
            });
        };

        window.stopPush = function() {
            log('stopPush called');
            clearConnectingTimeout();
            if (livePusher) {
                livePusher.stopPush();
                livePusher.stopCamera();
                livePusher.stopMicrophone();
                livePusher = null;
            }
            isPushing = false;
            retryCount = 0;
            setStatus('推流已停止');
        };

        log('Page loaded');
    </script>
    <script src="https://video.sdk.qcloudecdn.com/web/TXLivePusher-2.1.1.min.js" charset="utf-8"></script>
</body>
</html>
